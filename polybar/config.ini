; Polybar replacement for the previous i3bar + i3blocks setup.
; Primary monitor: workspaces+tray on top, status on bottom.
; Secondary monitor: a workspace-only bar (bar/top-secondary), no tray.
; The bottom bar uses a 253px top border (bg-coloured) to reproduce the
; "spacer" gap that the old i3 bottom-spacer bar provided.

[colors]
background = #1e1e2e
foreground = #cdd6f4
accent     = #89b4fa
active     = #cba6f7
urgent     = #f38ba8
inactive   = #6c7086

[bar/top]
monitor = ${env:MONITOR:}
bottom = false
width = 100%
height = 48
background = ${colors.background}
foreground = ${colors.foreground}
; Fallback fonts cover dingbats/symbols/emoji used in renamed workspace names.
font-0 = DejaVu Sans Mono:size=24;3
font-1 = Noto Sans Symbols:size=24;3
font-2 = Noto Sans Symbols2:size=24;3
font-3 = Noto Color Emoji:scale=10;3
module-margin = 2
padding-left = 1
padding-right = 1

modules-left = tray i3

enable-ipc = true

; Secondary-monitor bar: workspace names only, no tray or status modules.
[bar/top-secondary]
inherit = bar/top
modules-left = i3

[bar/bottom]
monitor = ${env:MONITOR:}
bottom = true
width = 100%
height = 60
border-top-size = 253
border-top-color = ${colors.background}
background = ${colors.background}
foreground = ${colors.foreground}
font-0 = DejaVu Sans Mono:size=36;3
font-1 = Noto Sans Symbols2:size=36;3
module-margin = 1
padding-left = 1
padding-right = 2

modules-right = battery volume network fs memory cpu temperature date

enable-ipc = true

[module/tray]
type = internal/tray
tray-spacing = 4
tray-background = ${colors.background}

[module/i3]
type = internal/i3
pin-workspaces = true
strip-wsnumbers = true
enable-click = true
enable-scroll = false
format = <label-state>

label-focused = %name%
label-focused-background = ${colors.accent}
label-focused-foreground = ${colors.background}
label-focused-padding = 1

label-visible = %name%
label-visible-foreground = ${colors.active}
label-visible-padding = 1

label-unfocused = %name%
label-unfocused-foreground = ${colors.inactive}
label-unfocused-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.urgent}
label-urgent-foreground = ${colors.background}
label-urgent-padding = 1

[module/battery]
type = internal/battery
battery = BAT1
adapter = ACAD
full-at = 98
poll-interval = 5
format-charging = <label-charging>
format-discharging = <label-discharging>
format-full = <label-full>
label-charging = ⚡ %percentage%%
label-discharging = 🔋 %percentage%%
label-full = 🔋 %percentage%%

[module/volume]
type = internal/pulseaudio
format-volume = <label-volume>
format-muted = <label-muted>
label-volume = 🔊 %percentage%%
label-muted = 🔇 muted
label-muted-foreground = ${colors.inactive}

[module/memory]
type = internal/memory
interval = 30
format = <label>
label = ▦ %percentage_used%%

[module/network]
type = internal/network
interface-type = wireless
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-connected = 🖧 %local_ip%
label-disconnected = 🖧 --

[module/fs]
type = internal/fs
mount-0 = /
interval = 30
format-mounted = <label-mounted>
format-unmounted = <label-unmounted>
label-mounted = 🏠 %percentage_used%%
label-unmounted = 🏠 --

[module/cpu]
type = internal/cpu
interval = 10
format = <label>
label = ▣ %percentage:3%%

[module/temperature]
type = internal/temperature
interval = 5
thermal-zone = 3
base-temperature = 20
warn-temperature = 80
format = <label>
format-warn = <label-warn>
label = 🌡 %temperature-c%
label-warn = 🌡 %temperature-c%
label-warn-foreground = #f00

[module/date]
type = internal/date
interval = 5
date = %Y-%m-%d %H:%M:%S
format = <label>
label = %date%

[settings]
screenchange-reload = true
